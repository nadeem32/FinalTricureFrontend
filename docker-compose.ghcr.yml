# Full stack from GHCR – copied to Hetzner on each deploy by GitHub Actions.
# Server only needs /opt/tricure/.env (secrets). Do not edit this file on the server.

services:
  postgres:
    image: postgres:15-alpine
    container_name: tricure-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-tricuredb}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tricure-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-tricuredb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/tricure-backend:${IMAGE_TAG:-latest}
    container_name: tricure-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-tricuredb}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
    networks:
      - tricure-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8095/api/settings || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/tricure-frontend:${IMAGE_TAG:-latest}
    container_name: tricure-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - tricure-network

networks:
  tricure-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
